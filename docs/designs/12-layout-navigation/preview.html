<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myFitness — Layout Preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap');
  body { font-family: 'Inter', sans-serif; }
  .font-mono-brand { font-family: 'JetBrains Mono', monospace; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .animate-pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
</style>
</head>
<body class="bg-[#0a0a0a] text-[#ededed] min-h-screen">

<!-- Mobile Header -->
<header id="mobileHeader" class="fixed top-0 left-0 right-0 z-30 h-12 bg-[#0a0a0a]/90 backdrop-blur-md border-b border-[#1e1e1e] flex items-center px-4 md:hidden">
  <button onclick="toggleSidebar()" class="p-1.5 -ml-1.5 text-[#737373] hover:text-[#ededed] transition-colors">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M3 5h14M3 10h14M3 15h14"/>
    </svg>
  </button>
  <span class="ml-3 text-[13px] tracking-[0.08em] text-[#a3a3a3] font-mono-brand">myFitness</span>
</header>

<!-- Backdrop -->
<div id="backdrop" class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm hidden md:hidden" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 z-50 h-full w-60 bg-[#0a0a0a] border-r border-[#1e1e1e] flex flex-col transition-transform duration-200 ease-out -translate-x-full md:translate-x-0">

  <!-- Brand -->
  <div class="px-5 pt-7 pb-8">
    <div class="flex items-center gap-2.5">
      <div class="w-7 h-7 rounded-md bg-[#22c55e]/10 border border-[#22c55e]/20 flex items-center justify-center">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 8l3 3 7-8" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="text-[15px] tracking-[0.08em] text-[#ededed] font-mono-brand">myFitness</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-3">
    <ul class="space-y-0.5">
      <!-- 대시보드 (Active) -->
      <li>
        <a href="#" onclick="setActive(this, event)" class="nav-item relative flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13px] tracking-wide transition-colors duration-150 text-[#ededed] bg-[#161616]">
          <span class="absolute left-0 top-2 bottom-2 w-[2px] rounded-full bg-[#22c55e] active-bar"></span>
          <span class="text-[#22c55e] nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="7" height="8" rx="1"/><rect x="11" y="2" width="7" height="5" rx="1"/><rect x="2" y="12" width="7" height="6" rx="1"/><rect x="11" y="9" width="7" height="9" rx="1"/>
            </svg>
          </span>
          <span>대시보드</span>
        </a>
      </li>
      <!-- 러닝/활동 -->
      <li>
        <a href="#" onclick="setActive(this, event)" class="nav-item relative flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13px] tracking-wide transition-colors duration-150 text-[#737373] hover:text-[#a3a3a3] hover:bg-[#111111]">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="10" cy="3.5" r="2"/><path d="M7 8.5l3 2 3-2"/><path d="M10 10.5v4"/><path d="M7 18l3-3.5 3 3.5"/><path d="M5 12l2-1.5"/><path d="M15 12l-2-1.5"/>
            </svg>
          </span>
          <span>러닝/활동</span>
        </a>
      </li>
      <!-- 수면 -->
      <li>
        <a href="#" onclick="setActive(this, event)" class="nav-item relative flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13px] tracking-wide transition-colors duration-150 text-[#737373] hover:text-[#a3a3a3] hover:bg-[#111111]">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16.5 11a7 7 0 1 1-8.5-6.8A5.5 5.5 0 0 0 16.5 11z"/>
            </svg>
          </span>
          <span>수면</span>
        </a>
      </li>
      <!-- 심박 -->
      <li>
        <a href="#" onclick="setActive(this, event)" class="nav-item relative flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13px] tracking-wide transition-colors duration-150 text-[#737373] hover:text-[#a3a3a3] hover:bg-[#111111]">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 17s-7-4.35-7-8.5A4 4 0 0 1 10 5.5a4 4 0 0 1 7 3c0 4.15-7 8.5-7 8.5z"/>
            </svg>
          </span>
          <span>심박</span>
        </a>
      </li>
      <!-- 체성분 -->
      <li>
        <a href="#" onclick="setActive(this, event)" class="nav-item relative flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13px] tracking-wide transition-colors duration-150 text-[#737373] hover:text-[#a3a3a3] hover:bg-[#111111]">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="5" width="14" height="12" rx="2"/><path d="M7 1v4M13 1v4"/><circle cx="10" cy="11" r="2.5"/>
            </svg>
          </span>
          <span>체성분</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Footer -->
  <div class="px-5 py-4 border-t border-[#1e1e1e]">
    <div class="flex items-center gap-2 text-[11px] text-[#525252] tracking-wide">
      <span class="w-1.5 h-1.5 rounded-full bg-[#22c55e] animate-pulse-dot"></span>
      <span>Garmin 연동됨</span>
    </div>
  </div>
</aside>

<!-- Main Content -->
<main class="md:ml-60 min-h-screen pt-12 md:pt-0">
  <div class="p-5 md:p-8 max-w-6xl">
    <h1 class="text-2xl font-medium mb-2">대시보드</h1>
    <p class="text-[#737373] text-sm mb-8">오늘의 피트니스 요약</p>

    <!-- Sample cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div class="bg-[#161616] border border-[#262626] rounded-xl p-4">
        <div class="text-[11px] text-[#525252] tracking-wide mb-2">걸음 수</div>
        <div class="text-xl font-medium">8,432</div>
        <div class="text-[11px] text-[#22c55e] mt-1">+12%</div>
      </div>
      <div class="bg-[#161616] border border-[#262626] rounded-xl p-4">
        <div class="text-[11px] text-[#525252] tracking-wide mb-2">안정시 심박</div>
        <div class="text-xl font-medium">58 <span class="text-[13px] text-[#525252]">bpm</span></div>
        <div class="text-[11px] text-[#22c55e] mt-1">-2 bpm</div>
      </div>
      <div class="bg-[#161616] border border-[#262626] rounded-xl p-4">
        <div class="text-[11px] text-[#525252] tracking-wide mb-2">수면 점수</div>
        <div class="text-xl font-medium">82</div>
        <div class="text-[11px] text-[#737373] mt-1">양호</div>
      </div>
      <div class="bg-[#161616] border border-[#262626] rounded-xl p-4">
        <div class="text-[11px] text-[#525252] tracking-wide mb-2">바디배터리</div>
        <div class="text-xl font-medium">67</div>
        <div class="text-[11px] text-[#737373] mt-1">보통</div>
      </div>
    </div>
  </div>
</main>

<script>
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('backdrop');
  sidebar.classList.toggle('-translate-x-full');
  backdrop.classList.toggle('hidden');
}

function setActive(el, e) {
  e.preventDefault();
  // Reset all
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('text-[#ededed]', 'bg-[#161616]');
    item.classList.add('text-[#737373]');
    const bar = item.querySelector('.active-bar');
    if (bar) bar.remove();
    const icon = item.querySelector('.nav-icon');
    if (icon) icon.classList.remove('text-[#22c55e]');
  });
  // Set active
  el.classList.remove('text-[#737373]');
  el.classList.add('text-[#ededed]', 'bg-[#161616]');
  const bar = document.createElement('span');
  bar.className = 'absolute left-0 top-2 bottom-2 w-[2px] rounded-full bg-[#22c55e] active-bar';
  el.prepend(bar);
  el.querySelector('.nav-icon').classList.add('text-[#22c55e]');
}
</script>
</body>
</html>
